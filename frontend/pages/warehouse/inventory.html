<!-- frontend/pages/warehouse/inventory.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Warehouse</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/warehouse.css">
</head>
<body>
    <div class="app">
        <header id="appHeader"></header>
        
        <div class="app-body">
            <aside id="sidebar"></aside>
            
            <main class="main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Inventory Management</h1>
                        <p class="page-subtitle">View and manage stock levels across your warehouse</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-primary" onclick="openAdjustStockModal()">
                            <span>✏️</span> Adjust Stock
                        </button>
                    </div>
                </div>
                
                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>🔍 Search</label>
                            <input type="text" id="searchInput" placeholder="Product name or SKU...">
                        </div>
                        <div class="filter-group">
                            <label>📁 Category</label>
                            <select id="categoryFilter">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>📊 Stock Status</label>
                            <select id="stockStatusFilter">
                                <option value="">All</option>
                                <option value="low">Low Stock Only</option>
                                <option value="out">Out of Stock</option>
                                <option value="in">In Stock</option>
                            </select>
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-primary btn-sm" id="applyFilter">Apply</button>
                            <button class="btn btn-secondary btn-sm" id="resetFilter">Reset</button>
                        </div>
                    </div>
                </div>
                
                <!-- Inventory Table -->
                <div class="card">
                    <div class="card-header">
                        <h3>Current Inventory</h3>
                        <span class="badge" id="inventoryCount">0 items</span>
                    </div>
                    <div class="card-body">
                        <div id="inventoryTable" class="table-container">
                            <div class="loading">Loading inventory...</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Adjust Stock Modal -->
    <div id="adjustStockModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Adjust Stock</h2>
                <button class="close-btn" onclick="closeAdjustStockModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="adjustStockForm">
                    <input type="hidden" id="adjustProductId">
                    <input type="hidden" id="adjustWarehouseId">
                    
                    <div class="form-group">
                        <label>Product</label>
                        <input type="text" id="adjustProductName" readonly disabled>
                    </div>
                    
                    <div class="form-group">
                        <label>Current Quantity</label>
                        <input type="number" id="adjustCurrentQty" readonly disabled>
                    </div>
                    
                    <div class="form-group">
                        <label>New Quantity *</label>
                        <input type="number" id="adjustNewQty" required min="0">
                        <small class="help-text">Enter the new total quantity after adjustment</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Reason for Adjustment *</label>
                        <select id="adjustReason" required>
                            <option value="">Select Reason</option>
                            <option value="DAMAGE">Damage - Product damaged in warehouse</option>
                            <option value="THEFT">Theft - Product stolen</option>
                            <option value="COUNT_ERROR">Count Error - Physical count mismatch</option>
                            <option value="EXPIRED">Expired - Product reached expiration</option>
                            <option value="QUALITY_ISSUE">Quality Issue - Quality control failure</option>
                            <option value="RETURN_TO_SUPPLIER">Return to Supplier - Defective items</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="adjustNotes" rows="2" placeholder="Additional details..."></textarea>
                    </div>
                    
                    <div class="form-group warning-note" id="approvalWarning" style="display:none;">
                        <p>⚠️ This type of adjustment requires admin approval.</p>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeAdjustStockModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitStockAdjustment()">Submit Adjustment</button>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/warehouse-inventory.js"></script>
</body>
</html>
