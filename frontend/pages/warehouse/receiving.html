<!-- frontend/pages/warehouse/receiving.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receive Stock - Warehouse</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/warehouse.css">
</head>
<body>
    <div class="app">
        <header id="appHeader"></header>
        
        <div class="app-body">
            <aside id="sidebar"></aside>
            
            <main class="main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Receive Stock</h1>
                        <p class="page-subtitle">Process incoming purchase orders and add stock to inventory</p>
                    </div>
                </div>
                
                <!-- Expected Deliveries Section -->
                <div class="card">
                    <div class="card-header">
                        <h3>📦 Expected Deliveries</h3>
                        <span class="badge" id="pendingCount">0 pending</span>
                    </div>
                    <div class="card-body">
                        <div id="pendingDeliveries">
                            <div class="loading">Loading expected deliveries...</div>
                        </div>
                    </div>
                </div>
                
                <!-- Receiving Form -->
                <div class="card" id="receivingFormCard" style="display:none;">
                    <div class="card-header">
                        <h3>📥 Receive Purchase Order</h3>
                        <button class="close-btn" onclick="closeReceivingForm()">&times;</button>
                    </div>
                    <div class="card-body">
                        <form id="receivingForm">
                            <input type="hidden" id="receiveOrderId">
                            <input type="hidden" id="receivePoNumber">
                            
                            <div class="receiving-info">
                                <div class="info-row">
                                    <span class="info-label">PO Number:</span>
                                    <span id="receivePoNumberDisplay" class="info-value"></span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Supplier:</span>
                                    <span id="receiveSupplier" class="info-value"></span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Expected Date:</span>
                                    <span id="receiveExpectedDate" class="info-value"></span>
                                </div>
                            </div>
                            
                            <h4>Items to Receive</h4>
                            <div id="receiveItemsList" class="receive-items-list"></div>
                            
                            <div class="form-group">
                                <label>Warehouse *</label>
                                <select id="receiveWarehouse" required>
                                    <option value="">Select Warehouse</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Location (Aisle/Side/Shelf/Layer)</label>
                                <div class="location-inputs">
                                    <input type="number" id="receiveAisle" placeholder="Aisle" min="1">
                                    <select id="receiveSide">
                                        <option value="left">Left</option>
                                        <option value="right">Right</option>
                                    </select>
                                    <input type="number" id="receiveShelf" placeholder="Shelf" min="1">
                                    <select id="receiveLayer">
                                        <option value="top">Top</option>
                                        <option value="middle">Middle</option>
                                        <option value="middle2">Middle 2</option>
                                        <option value="middle3">Middle 3</option>
                                        <option value="bottom">Bottom</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Notes</label>
                                <textarea id="receiveNotes" rows="2" placeholder="Optional notes about this shipment..."></textarea>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button class="btn" onclick="closeReceivingForm()">Cancel</button>
                        <button class="btn btn-primary" onclick="submitReceiveStock()">Confirm Receipt</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/chat.js"></script>
    <script src="../../js/warehouse-receiving.js"></script>
</body>
</html>
