<!-- frontend/pages/sales/products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Sales | Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Base CSS (required for theme system) -->
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/theme-switcher.css">
    <link rel="stylesheet" href="../../css/theme-layouts.css">
    <link rel="stylesheet" href="../../css/main.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="../../css/sales.css">
    <link rel="stylesheet" href="../../css/sales-products.css">
    <!-- Chat CSS -->
    <link rel="stylesheet" href="../../css/chat.css">
</head>
<body>
    <div class="app">
        <!-- Header will be injected here -->
        <header id="appHeader"></header>
        
        <div class="app-body">
            <!-- Sidebar will be injected here -->
            <aside id="sidebar"></aside>
            
            <!-- Main Content with Unified Panel Container -->
            <main class="main-content">
                <div class="global-container">
                    <div class="panel-container">
                        <!-- Theme Header Widget -->
                        <div class="theme-header-widget" id="themeHeaderWidget"></div>
                    
                        <a href="dashboard.html" class="back-link">← Back to Catalog</a>
                        
                        <div id="productContent" class="product-detail-container">
                            <div class="loading-state">Loading product details...</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/chat.js"></script>
    <script src="../../js/sales-products-detail.js"></script>
</body>
</html>
