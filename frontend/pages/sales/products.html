<!-- frontend/pages/sales/products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Sales | Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/sales-products.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="header-left">
                <h1>inventory.app</h1>
            </div>
            <div class="header-right">
                <div class="header-user">
                    <span class="user-name" id="userName">Loading...</span>
                    <span class="user-role" id="userRole">sales</span>
                </div>
            </div>
        </header>
        
        <div class="app-body">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="logo">inventory<span>.app</span></div>
                    <div class="user-badge">
                        <span class="user-role" id="sidebarRole">sales</span>
                        <span class="user-name" id="sidebarName">Sales Associate</span>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                    <a href="orders.html" class="nav-item">📋 Orders</a>
                    <a href="customers.html" class="nav-item">👥 Customers</a>
                </nav>
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="auth.logout()">🚪 Logout</button>
                </div>
            </aside>
            
            <main class="main-content">
                <a href="dashboard.html" class="back-link">← Back to Catalog</a>
                
                <div id="productContent" class="product-detail-container">
                    <div class="loading-state">Loading product details...</div>
                </div>
            </main>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/chat.js"></script>
    <script src="../../js/sales-products-detail.js"></script>
</body>
</html>
