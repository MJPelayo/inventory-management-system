<!-- frontend/pages/sales/products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Sales | Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #f7f6f3;
            --surface: #ffffff;
            --border: #e2e0d8;
            --text: #1a1917;
            --text-2: #6b6860;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }
        
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .header-left h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: var(--bg);
            border-radius: 9999px;
        }
        
        .user-name {
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .user-role {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 9999px;
            background: #eff6ff;
            color: var(--accent);
            text-transform: capitalize;
        }
        
        .app-body {
            display: flex;
            flex: 1;
        }
        
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 64px;
            height: calc(100vh - 64px);
        }
        
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            margin-bottom: 16px;
        }
        
        .logo span {
            color: var(--accent);
        }
        
        .sidebar-nav {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: var(--bg);
            color: var(--text);
        }
        
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        
        .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--danger);
            border-radius: var(--radius-sm);
        }
        
        .main-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-2);
            text-decoration: none;
            margin-bottom: 24px;
            font-size: 0.875rem;
        }
        
        .back-link:hover {
            color: var(--accent);
        }
        
        .product-detail-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .product-title h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .product-sku {
            color: var(--text-2);
            font-family: monospace;
            font-size: 0.875rem;
        }
        
        .product-price-large {
            text-align: right;
        }
        
        .product-price-large .price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .product-price-large .cost {
            font-size: 0.875rem;
            color: var(--text-2);
        }
        
        .product-info {
            margin-bottom: 24px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .info-card {
            background: var(--bg);
            padding: 16px;
            border-radius: var(--radius-sm);
        }
        
        .info-card label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-2);
            display: block;
            margin-bottom: 8px;
        }
        
        .info-card .value {
            font-size: 1rem;
            font-weight: 500;
        }
        
        .stock-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .stock-in-stock {
            background: #ecfdf5;
            color: var(--success);
        }
        
        .stock-low-stock {
            background: #fffbeb;
            color: var(--warning);
        }
        
        .stock-out-of-stock {
            background: #fef2f2;
            color: var(--danger);
        }
        
        .inventory-section {
            margin: 24px 0;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        
        .inventory-section h3 {
            font-size: 1rem;
            margin-bottom: 16px;
        }
        
        .warehouse-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .warehouse-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg);
            border-radius: var(--radius-sm);
        }
        
        .warehouse-name {
            font-weight: 500;
        }
        
        .warehouse-quantity {
            font-weight: 600;
            color: var(--accent);
        }
        
        .add-to-cart-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .quantity-selector label {
            font-weight: 500;
        }
        
        .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .qty-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .qty-input {
            width: 60px;
            text-align: center;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
        }
        
        .btn-add-large {
            padding: 12px 32px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }
        
        .btn-add-large:hover {
            background: var(--accent-dark);
        }
        
        .loading-state, .error-state {
            text-align: center;
            padding: 60px;
            color: var(--text-2);
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        
        @media (max-width: 640px) {
            .main-content { padding: 16px; }
            .product-detail-container { padding: 20px; }
            .info-grid { grid-template-columns: 1fr; }
            .product-header { flex-direction: column; }
            .product-price-large { text-align: left; }
            .add-to-cart-section { flex-direction: column; }
            .btn-add-large { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="header-left">
                <h1>inventory.app</h1>
            </div>
            <div class="header-right">
                <div class="header-user">
                    <span class="user-name" id="userName">Loading...</span>
                    <span class="user-role" id="userRole">sales</span>
                </div>
            </div>
        </header>
        
        <div class="app-body">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="logo">inventory<span>.app</span></div>
                    <div class="user-badge">
                        <span class="user-role" id="sidebarRole">sales</span>
                        <span class="user-name" id="sidebarName">Sales Associate</span>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                    <a href="orders.html" class="nav-item">📋 Orders</a>
                </nav>
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="auth.logout()">🚪 Logout</button>
                </div>
            </aside>
            
            <main class="main-content">
                <a href="dashboard.html" class="back-link">← Back to Catalog</a>
                
                <div id="productContent" class="product-detail-container">
                    <div class="loading-state">Loading product details...</div>
                </div>
            </main>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        // Update header with user info
        const user = auth.getCurrentUser();
        if (user) {
            document.getElementById('userName').textContent = user.name || 'Sales User';
            document.getElementById('userRole').textContent = user.role || 'sales';
            document.getElementById('sidebarName').textContent = user.name || 'Sales Associate';
            document.getElementById('sidebarRole').textContent = user.role || 'sales';
        }
        
        let currentProduct = null;
        let quantity = 1;
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function changeQuantity(delta) {
            quantity = Math.max(1, Math.min(99, quantity + delta));
            document.getElementById('qtyValue').value = quantity;
        }
        
        async function addToCart() {
            if (!currentProduct) return;
            
            try {
                // Get cart from localStorage
                let cart = JSON.parse(localStorage.getItem('sales_cart') || '[]');
                
                const existingItem = cart.find(item => item.id === currentProduct.id);
                if (existingItem) {
                    existingItem.quantity += quantity;
                } else {
                    cart.push({
                        id: currentProduct.id,
                        name: currentProduct.name,
                        sku: currentProduct.sku,
                        price: parseFloat(currentProduct.price),
                        quantity: quantity,
                        brand: currentProduct.brand || ''
                    });
                }
                
                localStorage.setItem('sales_cart', JSON.stringify(cart));
                showToast(`${currentProduct.name} added to cart!`, 'success');
                
                // Redirect back to dashboard after short delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                console.error('Failed to add to cart:', error);
                showToast('Failed to add to cart', 'error');
            }
        }
        
        async function loadProduct() {
            if (!productId) {
                document.getElementById('productContent').innerHTML = '<div class="error-state">Product ID not provided</div>';
                return;
            }
            
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/products/${productId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem(CONFIG.TOKEN_KEY)}` }
                });
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);
                currentProduct = data.data;
                
                // Calculate total stock
                const inventory = currentProduct.inventory || [];
                const totalStock = inventory.reduce((sum, inv) => sum + inv.quantity, 0);
                
                let stockClass = 'stock-out-of-stock';
                let stockText = 'Out of Stock';
                if (totalStock > 10) {
                    stockClass = 'stock-in-stock';
                    stockText = 'In Stock';
                } else if (totalStock > 0) {
                    stockClass = 'stock-low-stock';
                    stockText = `Low Stock (${totalStock} left)`;
                }
                
                // Build warehouse HTML
                let warehouseHtml = '';
                if (inventory.length > 0) {
                    warehouseHtml = inventory.map(inv => `
                        <div class="warehouse-item">
                            <span class="warehouse-name">${escapeHtml(inv.warehouse_name || 'Warehouse ID: ' + inv.warehouse_id)}</span>
                            <span class="warehouse-quantity">${inv.quantity} units</span>
                        </div>
                    `).join('');
                } else {
                    warehouseHtml = '<div class="warehouse-item">No inventory records found</div>';
                }
                
                document.getElementById('productContent').innerHTML = `
                    <div class="product-header">
                        <div class="product-title">
                            <h1>${escapeHtml(currentProduct.name)}</h1>
                            <div class="product-sku">SKU: ${escapeHtml(currentProduct.sku)}</div>
                        </div>
                        <div class="product-price-large">
                            <div class="price">$${parseFloat(currentProduct.price).toFixed(2)}</div>
                            <div class="cost">Cost: $${parseFloat(currentProduct.cost).toFixed(2)}</div>
                        </div>
                    </div>
                    
                    <div class="product-info">
                        <div class="info-grid">
                            <div class="info-card">
                                <label>Brand</label>
                                <div class="value">${escapeHtml(currentProduct.brand || '—')}</div>
                            </div>
                            <div class="info-card">
                                <label>Category</label>
                                <div class="value">${escapeHtml(currentProduct.category_name || '—')}</div>
                            </div>
                            <div class="info-card">
                                <label>Supplier</label>
                                <div class="value">${escapeHtml(currentProduct.supplier_name || '—')}</div>
                            </div>
                            <div class="info-card">
                                <label>Stock Status</label>
                                <div class="value"><span class="stock-status ${stockClass}">${stockText}</span></div>
                            </div>
                        </div>
                        ${currentProduct.description ? `<p style="color: var(--text-2); line-height: 1.6;">${escapeHtml(currentProduct.description)}</p>` : ''}
                    </div>
                    
                    <div class="inventory-section">
                        <h3>📦 Inventory by Warehouse</h3>
                        <div class="warehouse-list">
                            ${warehouseHtml}
                        </div>
                    </div>
                    
                    <div class="add-to-cart-section">
                        <div class="quantity-selector">
                            <label>Quantity:</label>
                            <div class="qty-control">
                                <button class="qty-btn" onclick="changeQuantity(-1)">-</button>
                                <input type="number" id="qtyValue" class="qty-input" value="1" min="1" max="99" onchange="quantity = parseInt(this.value) || 1">
                                <button class="qty-btn" onclick="changeQuantity(1)">+</button>
                            </div>
                        </div>
                        <button class="btn-add-large" onclick="addToCart()">🛒 Add to Cart</button>
                    </div>
                `;
                
                // Set up quantity input listener
                const qtyInput = document.getElementById('qtyValue');
                if (qtyInput) {
                    qtyInput.addEventListener('change', function() {
                        quantity = Math.max(1, Math.min(99, parseInt(this.value) || 1));
                        this.value = quantity;
                    });
                }
                
            } catch (error) {
                console.error('Failed to load product:', error);
                document.getElementById('productContent').innerHTML = '<div class="error-state">Failed to load product details. Please try again.</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Load product on page load
        loadProduct();
        
        // Export functions
        window.changeQuantity = changeQuantity;
        window.addToCart = addToCart;
    </script>
</body>
</html>
