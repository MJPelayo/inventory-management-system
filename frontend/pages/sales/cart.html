<!-- frontend/pages/sales/cart.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Sales | Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #f7f6f3;
            --surface: #ffffff;
            --border: #e2e0d8;
            --text: #1a1917;
            --text-2: #6b6860;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }
        
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .header-left h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: var(--bg);
            border-radius: 9999px;
        }
        
        .user-name {
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .user-role {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 9999px;
            background: #eff6ff;
            color: var(--accent);
            text-transform: capitalize;
        }
        
        .app-body {
            display: flex;
            flex: 1;
        }
        
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 64px;
            height: calc(100vh - 64px);
        }
        
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            margin-bottom: 16px;
        }
        
        .logo span {
            color: var(--accent);
        }
        
        .sidebar-nav {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: var(--bg);
            color: var(--text);
        }
        
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        
        .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--danger);
            border-radius: var(--radius-sm);
        }
        
        .main-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .page-subtitle {
            color: var(--text-2);
            font-size: 0.875rem;
            margin-top: 4px;
        }
        
        .cart-layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        .cart-items-section {
            flex: 2;
            min-width: 280px;
        }
        
        .cart-summary-section {
            flex: 1;
            min-width: 280px;
        }
        
        .cart-items-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        
        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .cart-table th,
        .cart-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .cart-table th {
            background: var(--bg);
            font-weight: 600;
            color: var(--text-2);
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        
        .product-cell {
            display: flex;
            flex-direction: column;
        }
        
        .product-name-cell {
            font-weight: 600;
        }
        
        .product-sku-cell {
            font-size: 0.7rem;
            color: var(--text-2);
        }
        
        .quantity-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .qty-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .qty-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .qty-input {
            width: 50px;
            text-align: center;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
        }
        
        .remove-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.125rem;
            color: var(--danger);
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        
        .remove-btn:hover {
            opacity: 1;
        }
        
        .price-cell {
            font-weight: 600;
            color: var(--accent);
        }
        
        .total-cell {
            font-weight: 700;
        }
        
        .empty-cart {
            text-align: center;
            padding: 60px;
            color: var(--text-2);
        }
        
        .empty-cart-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        .continue-shopping {
            display: inline-block;
            margin-top: 16px;
            color: var(--accent);
            text-decoration: none;
        }
        
        /* Summary Card */
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            position: sticky;
            top: 88px;
        }
        
        .summary-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
        }
        
        .summary-row.total {
            font-size: 1.125rem;
            font-weight: 700;
            border-top: 1px solid var(--border);
            margin-top: 12px;
            padding-top: 16px;
        }
        
        .discount-row {
            color: var(--success);
        }
        
        .btn-checkout {
            width: 100%;
            padding: 14px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        
        .btn-checkout:hover {
            background: #0d9668;
        }
        
        .btn-clear {
            width: 100%;
            padding: 10px;
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-top: 12px;
            font-size: 0.875rem;
        }
        
        .btn-clear:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        
        .btn-continue {
            display: inline-block;
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-sm);
            margin-top: 16px;
        }
        
        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-2);
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.875rem;
        }
        
        .back-link:hover {
            color: var(--accent);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--accent); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { padding: 16px; }
            .cart-table th, .cart-table td { padding: 12px; }
            .quantity-cell { flex-wrap: wrap; }
        }
        
        @media (max-width: 640px) {
            .cart-layout { flex-direction: column; }
            .cart-table { font-size: 0.75rem; }
            .qty-input { width: 40px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="header-left">
                <h1>inventory.app</h1>
            </div>
            <div class="header-right">
                <div class="header-user">
                    <span class="user-name" id="userName">Loading...</span>
                    <span class="user-role" id="userRole">sales</span>
                </div>
            </div>
        </header>
        
        <div class="app-body">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="logo">inventory<span>.app</span></div>
                    <div class="user-badge">
                        <span class="user-role" id="sidebarRole">sales</span>
                        <span class="user-name" id="sidebarName">Sales Associate</span>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                    <a href="cart.html" class="nav-item active">🛒 Cart</a>
                    <a href="orders.html" class="nav-item">📋 Orders</a>
                    <a href="customers.html" class="nav-item">👥 Customers</a>
                </nav>
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="auth.logout()">🚪 Logout</button>
                </div>
            </aside>
            
            <main class="main-content">
                <a href="dashboard.html" class="back-link">← Continue Shopping</a>
                
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Shopping Cart</h1>
                        <p class="page-subtitle">Review and checkout your items</p>
                    </div>
                </div>
                
                <div class="cart-layout">
                    <div class="cart-items-section">
                        <div class="cart-items-container">
                            <div id="cartItemsContainer"></div>
                        </div>
                    </div>
                    
                    <div class="cart-summary-section">
                        <div class="summary-card">
                            <div class="summary-title">Order Summary</div>
                            <div class="summary-row">
                                <span>Subtotal:</span>
                                <span id="summarySubtotal">$0.00</span>
                            </div>
                            <div class="summary-row discount-row" id="discountRow" style="display: none;">
                                <span>Discount:</span>
                                <span id="summaryDiscount">-$0.00</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total:</span>
                                <span id="summaryTotal">$0.00</span>
                            </div>
                            <button class="btn-checkout" onclick="proceedToCheckout()">Proceed to Checkout</button>
                            <button class="btn-clear" onclick="clearCartItems()">Clear Cart</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content" style="max-width: 550px;">
            <div class="modal-header">
                <h2>Checkout</h2>
                <button class="close-btn" onclick="closeCheckoutModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Select Customer</label>
                    <select id="customerSelect">
                        <option value="">New Customer - Enter below</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Customer Name *</label>
                    <input type="text" id="customerName" placeholder="Full name">
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="customerEmail" placeholder="customer@email.com">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="customerPhone" placeholder="(555) 000-0000">
                    </div>
                </div>
                <div class="form-group">
                    <label>Delivery Type</label>
                    <select id="deliveryType" onchange="toggleDeliveryAddress()">
                        <option value="pickup">Pickup from Store</option>
                        <option value="delivery">Delivery to Address</option>
                    </select>
                </div>
                <div class="form-group" id="addressGroup" style="display:none;">
                    <label>Shipping Address</label>
                    <textarea id="shippingAddress" rows="2" placeholder="Street address, city, zip code"></textarea>
                </div>
                <hr>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Discount (%)</label>
                        <input type="number" id="discountAmount" value="0" min="0" max="100" oninput="updateCheckoutDiscount()">
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <input type="text" id="discountReason" placeholder="e.g., Bulk order">
                    </div>
                </div>
                <hr>
                <div class="order-summary" style="margin-top: 16px;">
                    <div class="summary-row" style="display: flex; justify-content: space-between; padding: 8px 0;">
                        <span>Subtotal:</span>
                        <span id="checkoutSubtotal">$0.00</span>
                    </div>
                    <div class="summary-row discount-row" style="display: flex; justify-content: space-between; padding: 8px 0;">
                        <span>Discount:</span>
                        <span id="discountDisplay">-$0.00</span>
                    </div>
                    <div class="summary-row total-row" style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.125rem; padding-top: 12px; margin-top: 8px; border-top: 1px solid var(--border);">
                        <span>Total:</span>
                        <span id="checkoutTotal">$0.00</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px; padding: 16px 24px; border-top: 1px solid var(--border);">
                <button class="btn btn-secondary" onclick="closeCheckoutModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitCartOrder()">Place Order</button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        // Update header with user info
        const user = auth.getCurrentUser();
        if (user) {
            document.getElementById('userName').textContent = user.name || 'Sales User';
            document.getElementById('userRole').textContent = user.role || 'sales';
            document.getElementById('sidebarName').textContent = user.name || 'Sales Associate';
            document.getElementById('sidebarRole').textContent = user.role || 'sales';
        }
        
        let cart = [];
        let customers = [];
        let currentDiscountPercent = 0;
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function loadCart() {
            const savedCart = localStorage.getItem('sales_cart');
            if (savedCart) {
                try {
                    cart = JSON.parse(savedCart);
                } catch (e) {
                    cart = [];
                }
            }
            renderCart();
        }
        
        function saveCart() {
            localStorage.setItem('sales_cart', JSON.stringify(cart));
            renderCart();
        }
        
        function updateCartItemQuantity(productId, delta) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                const newQuantity = item.quantity + delta;
                if (newQuantity <= 0) {
                    removeCartItem(productId);
                } else if (newQuantity <= 99) {
                    item.quantity = newQuantity;
                    saveCart();
                    showToast(`${item.name} quantity updated`, 'info');
                }
            }
        }
        
        function updateCartItemQuantityInput(productId, newQuantity) {
            const quantity = parseInt(newQuantity);
            if (isNaN(quantity) || quantity <= 0) {
                removeCartItem(productId);
            } else if (quantity <= 99) {
                const item = cart.find(i => i.id === productId);
                if (item) {
                    item.quantity = quantity;
                    saveCart();
                }
            }
        }
        
        function removeCartItem(productId) {
            const item = cart.find(i => i.id === productId);
            cart = cart.filter(i => i.id !== productId);
            saveCart();
            if (item) showToast(`${item.name} removed from cart`, 'info');
        }
        
        function clearCartItems() {
            if (confirm('Are you sure you want to clear your entire cart?')) {
                cart = [];
                saveCart();
                showToast('Cart cleared', 'info');
            }
        }
        
        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const discount = subtotal * (currentDiscountPercent / 100);
            const total = subtotal - discount;
            
            document.getElementById('summarySubtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('summaryTotal').textContent = `$${total.toFixed(2)}`;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p>Add products from the catalog to get started</p>
                        <a href="dashboard.html" class="continue-shopping">Browse Products →</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${cart.map(item => `
                            <tr>
                                <td>
                                    <div class="product-cell">
                                        <span class="product-name-cell">${escapeHtml(item.name)}</span>
                                        <span class="product-sku-cell">${escapeHtml(item.sku)}</span>
                                    </div>
                                </td>
                                <td class="price-cell">$${item.price.toFixed(2)}</td>
                                <td>
                                    <div class="quantity-cell">
                                        <button class="qty-btn" onclick="updateCartItemQuantity(${item.id}, -1)">-</button>
                                        <input type="number" class="qty-input" value="${item.quantity}" min="1" max="99" onchange="updateCartItemQuantityInput(${item.id}, this.value)">
                                        <button class="qty-btn" onclick="updateCartItemQuantity(${item.id}, 1)">+</button>
                                    </div>
                                </td>
                                <td class="total-cell">$${(item.price * item.quantity).toFixed(2)}</td>
                                <td><button class="remove-btn" onclick="removeCartItem(${item.id})">🗑️</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function proceedToCheckout() {
            if (cart.length === 0) {
                showToast('Your cart is empty. Add some products first.', 'error');
                return;
            }
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('checkoutSubtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('checkoutTotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('discountAmount').value = '0';
            document.getElementById('discountReason').value = '';
            
            // Reset form
            document.getElementById('customerName').value = '';
            document.getElementById('customerEmail').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('shippingAddress').value = '';
            document.getElementById('deliveryType').value = 'pickup';
            document.getElementById('addressGroup').style.display = 'none';
            
            // Load customers for dropdown
            loadCustomersForSelect();
            
            document.getElementById('checkoutModal').style.display = 'flex';
        }
        
        async function loadCustomersForSelect() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/orders/sales`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem(CONFIG.TOKEN_KEY)}` }
                });
                const data = await response.json();
                const orders = data.data || [];
                
                const customerMap = new Map();
                for (const order of orders) {
                    if (!customerMap.has(order.customer_name)) {
                        customerMap.set(order.customer_name, {
                            name: order.customer_name,
                            email: order.customer_email,
                            phone: order.customer_phone
                        });
                    }
                }
                customers = Array.from(customerMap.values());
                
                const select = document.getElementById('customerSelect');
                let html = '<option value="">New Customer - Enter below</option>';
                for (const customer of customers) {
                    html += `<option value="${escapeHtml(customer.name)}" data-email="${escapeHtml(customer.email || '')}" data-phone="${escapeHtml(customer.phone || '')}">
                        ${escapeHtml(customer.name)}
                    </option>`;
                }
                select.innerHTML = html;
                
                select.onchange = function() {
                    const opt = this.options[this.selectedIndex];
                    if (opt.value) {
                        document.getElementById('customerName').value = opt.value;
                        document.getElementById('customerEmail').value = opt.dataset.email || '';
                        document.getElementById('customerPhone').value = opt.dataset.phone || '';
                    } else {
                        document.getElementById('customerName').value = '';
                        document.getElementById('customerEmail').value = '';
                        document.getElementById('customerPhone').value = '';
                    }
                };
                
            } catch (error) {
                console.error('Failed to load customers:', error);
            }
        }
        
        function updateCheckoutDiscount() {
            const discountPercent = parseFloat(document.getElementById('discountAmount').value) || 0;
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const discountAmount = subtotal * (discountPercent / 100);
            const total = subtotal - discountAmount;
            
            document.getElementById('discountDisplay').textContent = `-$${discountAmount.toFixed(2)}`;
            document.getElementById('checkoutTotal').textContent = `$${total.toFixed(2)}`;
            currentDiscountPercent = discountPercent;
            
            // Update summary card too
            document.getElementById('summaryDiscount').textContent = `-$${discountAmount.toFixed(2)}`;
            document.getElementById('summaryTotal').textContent = `$${total.toFixed(2)}`;
            if (discountPercent > 0) {
                document.getElementById('discountRow').style.display = 'flex';
            } else {
                document.getElementById('discountRow').style.display = 'none';
            }
        }
        
        function toggleDeliveryAddress() {
            const deliveryType = document.getElementById('deliveryType');
            const addressGroup = document.getElementById('addressGroup');
            if (deliveryType && addressGroup) {
                addressGroup.style.display = deliveryType.value === 'delivery' ? 'block' : 'none';
            }
        }
        
        function closeCheckoutModal() {
            document.getElementById('checkoutModal').style.display = 'none';
        }
        
        async function submitCartOrder() {
            const customerName = document.getElementById('customerName').value.trim();
            const customerEmail = document.getElementById('customerEmail').value.trim();
            const customerPhone = document.getElementById('customerPhone').value.trim();
            const shippingAddress = document.getElementById('shippingAddress').value.trim();
            const deliveryType = document.getElementById('deliveryType').value;
            const discountPercent = parseFloat(document.getElementById('discountAmount').value) || 0;
            const discountReason = document.getElementById('discountReason').value.trim();
            
            if (!customerName) {
                showToast('Customer name is required', 'error');
                return;
            }
            
            if (deliveryType === 'delivery' && !shippingAddress) {
                showToast('Shipping address is required for delivery', 'error');
                return;
            }
            
            const orderItems = cart.map(item => ({
                product_id: item.id,
                product_name: item.name,
                quantity: item.quantity,
                unit_price: item.price
            }));
            
            const orderData = {
                customer_name: customerName,
                customer_email: customerEmail || null,
                customer_phone: customerPhone || null,
                shipping_address: shippingAddress || null,
                delivery_type: deliveryType,
                items: orderItems,
                discount_amount: discountPercent
            };
            
            try {
                showToast('Creating order...', 'info');
                
                const response = await fetch(`${CONFIG.API_BASE_URL}/orders/sales`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem(CONFIG.TOKEN_KEY)}`
                    },
                    body: JSON.stringify(orderData)
                });
                
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);
                
                // If discount needs approval
                if (discountPercent > 10 && discountReason) {
                    try {
                        await fetch(`${CONFIG.API_BASE_URL}/orders/sales/${data.data.id}/discount-request`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${localStorage.getItem(CONFIG.TOKEN_KEY)}`
                            },
                            body: JSON.stringify({
                                requested_discount: discountPercent,
                                reason: discountReason
                            })
                        });
                        showToast(`Order #${data.data.order_number} created with discount pending approval!`, 'success');
                    } catch (e) {
                        console.log('Discount request endpoint not available');
                    }
                } else {
                    showToast(`Order #${data.data.order_number} created successfully!`, 'success');
                }
                
                // Clear cart
                cart = [];
                localStorage.setItem('sales_cart', JSON.stringify(cart));
                
                closeCheckoutModal();
                renderCart();
                
                setTimeout(() => {
                    window.location.href = 'orders.html';
                }, 1500);
                
            } catch (error) {
                console.error('Failed to create order:', error);
                showToast(error.message || 'Failed to create order', 'error');
            }
        }
        
        // Load cart on page load
        loadCart();
        
        // Export functions
        window.updateCartItemQuantity = updateCartItemQuantity;
        window.updateCartItemQuantityInput = updateCartItemQuantityInput;
        window.removeCartItem = removeCartItem;
        window.clearCartItems = clearCartItems;
        window.proceedToCheckout = proceedToCheckout;
        window.closeCheckoutModal = closeCheckoutModal;
        window.submitCartOrder = submitCartOrder;
        window.updateCheckoutDiscount = updateCheckoutDiscount;
        window.toggleDeliveryAddress = toggleDeliveryAddress;
    </script>
</body>
</html>
