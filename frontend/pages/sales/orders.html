<!-- frontend/pages/sales/orders.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Orders - Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/sales.css">
    <style>
        /* Orders Page Specific Styles */
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .filter-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        
        .filter-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        
        .filter-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            color: var(--text-muted);
        }
        
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
        }
        
        .orders-table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .orders-table th,
        .orders-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.875rem;
        }
        
        .orders-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .orders-table tbody tr {
            cursor: pointer;
            transition: var(--transition);
        }
        
        .orders-table tbody tr:hover {
            background: var(--bg-tertiary);
        }
        
        /* Order Status Badges */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        
        .status-pending {
            background: var(--warning-bg);
            color: var(--warning);
        }
        
        .status-processing {
            background: var(--accent-primary-light);
            color: var(--accent-primary);
        }
        
        .status-ready {
            background: #e0f2fe;
            color: #0284c7;
        }
        
        .status-in_transit {
            background: #fef3c7;
            color: #d97706;
        }
        
        .status-delivered {
            background: var(--success-bg);
            color: var(--success);
        }
        
        .status-cancelled {
            background: var(--danger-bg);
            color: var(--danger);
        }
        
        .payment-status {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 9999px;
            display: inline-block;
        }
        
        .payment-paid {
            background: var(--success-bg);
            color: var(--success);
        }
        
        .payment-pending {
            background: var(--warning-bg);
            color: var(--warning);
        }
        
        /* Order Details Modal */
        .order-details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .order-info-card {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 16px;
        }
        
        .order-info-card h4 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        .order-info-card p {
            font-size: 0.875rem;
            margin-bottom: 6px;
        }
        
        .order-info-card strong {
            color: var(--text-primary);
        }
        
        .order-items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        
        .order-items-table th,
        .order-items-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.8rem;
        }
        
        .order-items-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }
        
        .order-total {
            text-align: right;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }
        
        .order-total p {
            font-size: 1rem;
            font-weight: 600;
        }
        
        /* Empty State */
        .empty-orders {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            padding: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .orders-table th,
            .orders-table td {
                padding: 10px 12px;
            }
            
            .order-details-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 640px) {
            .filter-row {
                flex-direction: column;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .orders-table {
                font-size: 0.75rem;
            }
            
            .orders-table th,
            .orders-table td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header will be injected here -->
        <header id="appHeader"></header>
        
        <div class="app-body">
            <!-- Sidebar will be injected here -->
            <aside id="sidebar"></aside>
            
            <!-- Main Content -->
            <main class="main-content">
                <!-- Page Header -->
                <div class="orders-header">
                    <div>
                        <h1 class="page-title">Sales Orders</h1>
                        <p class="page-subtitle">View and track customer orders</p>
                    </div>
                    <a href="dashboard.html" class="btn btn-primary">
                        <span>+</span> New Order
                    </a>
                </div>
                
                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>Order Status</label>
                            <select id="statusFilter">
                                <option value="">All Statuses</option>
                                <option value="pending">Pending</option>
                                <option value="processing">Processing</option>
                                <option value="ready">Ready</option>
                                <option value="in_transit">In Transit</option>
                                <option value="delivered">Delivered</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                        
                        <div class="filter-group">
                            <label>Customer Name</label>
                            <input type="text" id="customerFilter" placeholder="Search by customer...">
                        </div>
                        
                        <div class="filter-group">
                            <label>Date Range</label>
                            <input type="date" id="startDateFilter">
                        </div>
                        
                        <div class="filter-group">
                            <label>to</label>
                            <input type="date" id="endDateFilter">
                        </div>
                        
                        <div class="filter-actions">
                            <button class="btn btn-primary btn-sm" id="applyFilters">Apply</button>
                            <button class="btn btn-secondary btn-sm" id="resetFilters">Reset</button>
                        </div>
                    </div>
                </div>
                
                <!-- Orders Table -->
                <div class="orders-table-container">
                    <div id="ordersTableContainer">
                        <div class="loading-state">Loading orders...</div>
                    </div>
                </div>
                
                <!-- Pagination -->
                <div id="pagination" class="pagination"></div>
            </main>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- ORDER DETAILS MODAL -->
    <!-- ============================================ -->
    <div id="orderDetailsModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>Order Details</h2>
                <button class="close-btn" onclick="closeOrderDetailsModal()">&times;</button>
            </div>
            <div class="modal-body" id="orderDetailsContent">
                <div class="loading-state">Loading order details...</div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeOrderDetailsModal()">Close</button>
                <button class="btn btn-secondary" onclick="printOrder()">🖨️ Print</button>
            </div>
        </div>
    </div>
    
    <!-- JavaScript Dependencies -->
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/sales-orders.js"></script>
</body>
</html>
