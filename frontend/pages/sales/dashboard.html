<!-- frontend/pages/sales/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard - Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/sales.css">
    <style>
        /* Sales Dashboard Additional Styles */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .greeting {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .greeting small {
            font-size: 0.875rem;
            font-weight: normal;
            color: var(--text-muted);
        }
        
        /* Main Layout */
        .sales-layout {
            display: flex;
            gap: 24px;
            position: relative;
        }
        
        .products-section {
            flex: 1;
            min-width: 0;
        }
        
        /* Filter Bar */
        .filter-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        
        .filter-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        
        .filter-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            color: var(--text-muted);
        }
        
        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-family: var(--font-sans);
        }
        
        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-primary-light);
        }
        
        .price-range {
            display: flex;
            gap: 8px;
        }
        
        .price-range .filter-group {
            flex: 1;
        }
        
        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .product-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 16px;
            transition: var(--transition);
        }
        
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .product-card-header {
            margin-bottom: 12px;
        }
        
        .product-name {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }
        
        .product-sku {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
        
        .product-brand {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin: 12px 0;
        }
        
        .product-stock {
            margin: 12px 0;
        }
        
        .stock-status {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 9999px;
            display: inline-block;
        }
        
        .stock-status.in-stock {
            background: var(--success-bg);
            color: var(--success);
        }
        
        .stock-status.low-stock {
            background: var(--warning-bg);
            color: var(--warning);
        }
        
        .stock-status.out-of-stock {
            background: var(--danger-bg);
            color: var(--danger);
        }
        
        .product-card-footer {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 12px;
        }
        
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 4px;
        }
        
        .qty-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .qty-btn:hover {
            background: var(--accent-primary);
            color: white;
        }
        
        .qty-input {
            width: 45px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .qty-input:focus {
            outline: none;
        }
        
        .btn-add-to-cart {
            flex: 1;
            padding: 8px 12px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-add-to-cart:hover {
            background: var(--accent-primary-dark);
            transform: scale(0.98);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        
        /* Cart Sidebar */
        .cart-sidebar {
            width: 360px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            position: sticky;
            top: 80px;
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
        }
        
        .cart-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-header h3 {
            font-size: 1rem;
            font-weight: 600;
            margin: 0;
        }
        
        .cart-count {
            background: var(--accent-primary);
            color: white;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .empty-cart {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
        }
        
        .cart-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }
        
        .cart-item-info {
            margin-bottom: 8px;
        }
        
        .cart-item-name {
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .cart-item-price {
            font-size: 0.75rem;
            color: var(--accent-primary);
            font-weight: 600;
        }
        
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }
        
        .cart-qty-btn {
            width: 24px;
            height: 24px;
            border: 1px solid var(--border-light);
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
        }
        
        .cart-item-qty {
            font-size: 0.875rem;
            min-width: 30px;
            text-align: center;
        }
        
        .cart-remove-btn {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            opacity: 0.6;
        }
        
        .cart-remove-btn:hover {
            opacity: 1;
        }
        
        .cart-item-total {
            text-align: right;
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .cart-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: 16px;
        }
        
        .btn-checkout {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-checkout:hover {
            background: #0d9668;
        }
        
        .btn-clear-cart {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            background: none;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        /* Mobile Cart Toggle */
        .cart-toggle-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            z-index: 100;
        }
        
        /* Loading States */
        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .cart-sidebar {
                width: 300px;
            }
        }
        
        @media (max-width: 768px) {
            .sales-layout {
                flex-direction: column;
            }
            
            .cart-sidebar {
                position: fixed;
                top: 0;
                right: -100%;
                width: 85%;
                max-width: 360px;
                height: 100vh;
                z-index: 1000;
                transition: right 0.3s;
                border-radius: 0;
            }
            
            .cart-sidebar.open {
                right: 0;
            }
            
            .cart-toggle-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }
        
        @media (max-width: 640px) {
            .filter-row {
                flex-direction: column;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .filter-actions {
                width: 100%;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header will be injected here -->
        <header id="appHeader"></header>
        
        <div class="app-body">
            <!-- Sidebar will be injected here -->
            <aside id="sidebar"></aside>
            
            <!-- Main Content -->
            <main class="main-content">
                <!-- Dashboard Header -->
                <div class="dashboard-header">
                    <div>
                        <div class="greeting" id="userGreeting">Good day!</div>
                        <small>Browse products and create customer orders</small>
                    </div>
                </div>
                
                <!-- Sales Layout -->
                <div class="sales-layout">
                    <!-- Products Section -->
                    <div class="products-section">
                        <!-- Filter Bar -->
                        <div class="filter-bar">
                            <div class="filter-row">
                                <div class="filter-group">
                                    <label>🔍 Search</label>
                                    <input type="text" id="searchInput" placeholder="Product name or SKU...">
                                </div>
                                
                                <div class="filter-group">
                                    <label>📁 Category</label>
                                    <select id="categoryFilter">
                                        <option value="">All Categories</option>
                                    </select>
                                </div>
                                
                                <div class="filter-group">
                                    <label>💰 Price Range</label>
                                    <div class="price-range">
                                        <input type="number" id="minPrice" placeholder="Min $" step="10">
                                        <input type="number" id="maxPrice" placeholder="Max $" step="10">
                                    </div>
                                </div>
                                
                                <div class="filter-actions">
                                    <button class="btn btn-primary btn-sm" id="applyFilters">Apply</button>
                                    <button class="btn btn-secondary btn-sm" id="resetFilters">Reset</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Products Grid -->
                        <div id="productsGrid" class="products-grid">
                            <div class="loading-state">Loading products...</div>
                        </div>
                        
                        <!-- Pagination -->
                        <div id="pagination" class="pagination"></div>
                    </div>
                    
                    <!-- Cart Sidebar -->
                    <div id="cartSidebar" class="cart-sidebar">
                        <div class="cart-header">
                            <h3>🛒 Shopping Cart</h3>
                            <span class="cart-count" id="cartCount">0</span>
                        </div>
                        
                        <div id="cartItems" class="cart-items">
                            <div class="empty-cart">Your cart is empty</div>
                        </div>
                        
                        <div class="cart-footer">
                            <div class="cart-total">
                                <span>Total:</span>
                                <span id="cartTotal">$0.00</span>
                            </div>
                            <button class="btn-checkout" onclick="openCheckoutModal()">Proceed to Checkout</button>
                            <button class="btn-clear-cart" onclick="clearCart()">Clear Cart</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Mobile Cart Toggle Button -->
    <button class="cart-toggle-btn" onclick="toggleCartSidebar()">🛒</button>
    
    <!-- ============================================ -->
    <!-- CHECKOUT MODAL -->
    <!-- ============================================ -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content" style="max-width: 550px;">
            <div class="modal-header">
                <h2>Checkout</h2>
                <button class="close-btn" onclick="closeCheckoutModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Customer Name *</label>
                        <input type="text" id="customerName" required placeholder="Full name">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="customerEmail" placeholder="customer@email.com">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="customerPhone" placeholder="(555) 000-0000">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Delivery Type</label>
                        <select id="deliveryType">
                            <option value="pickup">Pickup from Store</option>
                            <option value="delivery">Delivery to Address</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="addressGroup">
                        <label>Shipping Address</label>
                        <textarea id="shippingAddress" rows="2" placeholder="Street address, city, zip code"></textarea>
                    </div>
                    
                    <hr>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Discount (%)</label>
                            <input type="number" id="discountAmount" value="0" min="0" max="100" step="1">
                            <small class="help-text">Discounts over 10% require admin approval</small>
                        </div>
                        <div class="form-group">
                            <label>Discount Reason</label>
                            <input type="text" id="discountReason" placeholder="e.g., Bulk order, Loyalty customer">
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="order-summary">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="checkoutSubtotal">$0.00</span>
                        </div>
                        <div class="summary-row discount-row">
                            <span>Discount:</span>
                            <span id="discountDisplay">-$0.00</span>
                        </div>
                        <div class="summary-row total-row">
                            <span>Total:</span>
                            <span id="checkoutTotal">$0.00</span>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeCheckoutModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitOrder()">Place Order</button>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>
    
    <!-- JavaScript Dependencies -->
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/sales.js"></script>
    
    <!-- Show/hide address field based on delivery type -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const deliveryType = document.getElementById('deliveryType');
            const addressGroup = document.getElementById('addressGroup');
            
            if (deliveryType && addressGroup) {
                deliveryType.addEventListener('change', function() {
                    addressGroup.style.display = this.value === 'delivery' ? 'block' : 'none';
                });
            }
        });
    </script>
</body>
</html>
