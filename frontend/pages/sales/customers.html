<!-- frontend/pages/sales/customers.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management - Sales | Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #f7f6f3;
            --surface: #ffffff;
            --border: #e2e0d8;
            --text: #1a1917;
            --text-2: #6b6860;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }
        
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .header-left h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: var(--bg);
            border-radius: 9999px;
        }
        
        .user-name {
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .user-role {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 9999px;
            background: #eff6ff;
            color: var(--accent);
            text-transform: capitalize;
        }
        
        .app-body {
            display: flex;
            flex: 1;
        }
        
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 64px;
            height: calc(100vh - 64px);
        }
        
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            margin-bottom: 16px;
        }
        
        .logo span {
            color: var(--accent);
        }
        
        .sidebar-nav {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: var(--bg);
            color: var(--text);
        }
        
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        
        .logout-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--danger);
            border-radius: var(--radius-sm);
        }
        
        .main-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .page-subtitle {
            color: var(--text-2);
            font-size: 0.875rem;
            margin-top: 4px;
        }
        
        .filter-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        
        .filter-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
            color: var(--text-2);
        }
        
        .filter-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
        }
        
        .customers-table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        
        .customers-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .customers-table th,
        .customers-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        
        .customers-table th {
            background: var(--bg);
            font-weight: 600;
            color: var(--text-2);
        }
        
        .customers-table tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .customers-table tbody tr:hover {
            background: var(--bg);
        }
        
        .customer-name {
            font-weight: 600;
            color: var(--accent);
        }
        
        .order-count {
            display: inline-block;
            padding: 2px 8px;
            background: var(--bg);
            border-radius: 9999px;
            font-size: 0.75rem;
        }
        
        .loading-state, .empty-state, .error-state {
            text-align: center;
            padding: 60px;
            color: var(--text-2);
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-secondary {
            background: var(--bg);
            border: 1px solid var(--border);
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.75rem;
        }
        
        /* Customer Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .customer-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg);
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-2);
            margin-top: 4px;
        }
        
        .order-history {
            margin-top: 24px;
        }
        
        .order-history h4 {
            margin-bottom: 12px;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .order-number {
            font-weight: 600;
        }
        
        .order-date {
            font-size: 0.75rem;
            color: var(--text-2);
        }
        
        .order-total {
            font-weight: 600;
            color: var(--accent);
        }
        
        .order-status {
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.7rem;
        }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { padding: 16px; }
            .customers-table th, .customers-table td { padding: 10px 12px; }
            .customer-stats { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 640px) {
            .filter-row { flex-direction: column; }
            .filter-group { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="header-left">
                <h1>inventory.app</h1>
            </div>
            <div class="header-right">
                <div class="header-user">
                    <span class="user-name" id="userName">Loading...</span>
                    <span class="user-role" id="userRole">sales</span>
                </div>
            </div>
        </header>
        
        <div class="app-body">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="logo">inventory<span>.app</span></div>
                    <div class="user-badge">
                        <span class="user-role" id="sidebarRole">sales</span>
                        <span class="user-name" id="sidebarName">Sales Associate</span>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                    <a href="orders.html" class="nav-item">📋 Orders</a>
                    <a href="customers.html" class="nav-item active">👥 Customers</a>
                </nav>
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="auth.logout()">🚪 Logout</button>
                </div>
            </aside>
            
            <main class="main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Customer Management</h1>
                        <p class="page-subtitle">View customer history and purchase patterns</p>
                    </div>
                </div>
                
                <div class="filter-bar">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>🔍 Search Customer</label>
                            <input type="text" id="searchInput" placeholder="Name, email, or phone...">
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-primary btn-sm" id="applyFilter">Search</button>
                            <button class="btn btn-secondary btn-sm" id="resetFilter">Reset</button>
                        </div>
                    </div>
                </div>
                
                <div class="customers-table-container">
                    <div id="customersTableContainer">
                        <div class="loading-state">Loading customers...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Customer Detail Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalCustomerName">Customer Details</h2>
                <button class="close-btn" onclick="closeCustomerModal()">&times;</button>
            </div>
            <div class="modal-body" id="customerDetailContent">
                <div class="loading-state">Loading...</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCustomerModal()">Close</button>
                <button class="btn btn-primary" id="newOrderBtn" onclick="createNewOrder()">+ New Order</button>
            </div>
        </div>
    </div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        // Update header with user info
        const user = auth.getCurrentUser();
        if (user) {
            document.getElementById('userName').textContent = user.name || 'Sales User';
            document.getElementById('userRole').textContent = user.role || 'sales';
            document.getElementById('sidebarName').textContent = user.name || 'Sales Associate';
            document.getElementById('sidebarRole').textContent = user.role || 'sales';
        }
        
        let allCustomers = [];
        let selectedCustomer = null;
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function formatDate(dateString) {
            if (!dateString) return '—';
            return new Date(dateString).toLocaleDateString();
        }
        
        async function loadCustomers() {
            const container = document.getElementById('customersTableContainer');
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            
            try {
                // Get all orders to extract customers
                const response = await fetch(`${CONFIG.API_BASE_URL}/orders/sales`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem(CONFIG.TOKEN_KEY)}` }
                });
                const data = await response.json();
                const orders = data.data || [];
                
                // Extract unique customers
                const customerMap = new Map();
                for (const order of orders) {
                    if (!customerMap.has(order.customer_name)) {
                        customerMap.set(order.customer_name, {
                            name: order.customer_name,
                            email: order.customer_email,
                            phone: order.customer_phone,
                            total_orders: 1,
                            total_spent: order.total_amount,
                            last_order_date: order.created_at,
                            orders: [order]
                        });
                    } else {
                        const existing = customerMap.get(order.customer_name);
                        existing.total_orders++;
                        existing.total_spent += order.total_amount;
                        existing.orders.push(order);
                        // Update last order date if newer
                        if (new Date(order.created_at) > new Date(existing.last_order_date)) {
                            existing.last_order_date = order.created_at;
                        }
                    }
                }
                
                allCustomers = Array.from(customerMap.values());
                
                // Apply search filter
                let filteredCustomers = allCustomers;
                if (searchTerm) {
                    filteredCustomers = allCustomers.filter(c => 
                        c.name.toLowerCase().includes(searchTerm) ||
                        (c.email && c.email.toLowerCase().includes(searchTerm)) ||
                        (c.phone && c.phone.includes(searchTerm))
                    );
                }
                
                // Sort by total spent descending
                filteredCustomers.sort((a, b) => b.total_spent - a.total_spent);
                
                if (filteredCustomers.length === 0) {
                    container.innerHTML = '<div class="empty-state">No customers found. Create orders to build customer history.</div>';
                    return;
                }
                
                container.innerHTML = `
                    <table class="customers-table">
                        <thead>
                            <tr>
                                <th>Customer Name</th>
                                <th>Contact</th>
                                <th>Orders</th>
                                <th>Total Spent</th>
                                <th>Last Order</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filteredCustomers.map(customer => `
                                <tr onclick="viewCustomerDetails('${escapeHtml(customer.name)}')">
                                    <td class="customer-name">${escapeHtml(customer.name)}</td>
                                    <td>
                                        ${customer.email ? `<div>📧 ${escapeHtml(customer.email)}</div>` : ''}
                                        ${customer.phone ? `<div>📞 ${escapeHtml(customer.phone)}</div>` : ''}
                                    </td>
                                    <td><span class="order-count">${customer.total_orders}</span></td>
                                    <td style="font-weight: 600; color: var(--accent);">$${customer.total_spent.toFixed(2)}</td>
                                    <td>${formatDate(customer.last_order_date)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                
            } catch (error) {
                console.error('Failed to load customers:', error);
                container.innerHTML = '<div class="error-state">Failed to load customers. Please try again.</div>';
            }
        }
        
        async function viewCustomerDetails(customerName) {
            const customer = allCustomers.find(c => c.name === customerName);
            if (!customer) return;
            
            selectedCustomer = customer;
            const modal = document.getElementById('customerModal');
            const content = document.getElementById('customerDetailContent');
            const modalTitle = document.getElementById('modalCustomerName');
            
            modalTitle.textContent = customer.name;
            
            // Sort orders by date descending
            const ordersSorted = [...(customer.orders || [])].sort((a, b) => 
                new Date(b.created_at) - new Date(a.created_at)
            );
            
            content.innerHTML = `
                <div class="customer-stats">
                    <div class="stat-card">
                        <div class="stat-value">${customer.total_orders}</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">$${customer.total_spent.toFixed(2)}</div>
                        <div class="stat-label">Total Spent</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">$${(customer.total_spent / customer.total_orders).toFixed(2)}</div>
                        <div class="stat-label">Avg Order Value</div>
                    </div>
                </div>
                
                <div class="order-history">
                    <h4>📋 Order History</h4>
                    ${ordersSorted.map(order => `
                        <div class="order-item">
                            <div>
                                <div class="order-number">${escapeHtml(order.order_number)}</div>
                                <div class="order-date">${formatDate(order.created_at)}</div>
                            </div>
                            <div class="order-total">$${order.total_amount.toFixed(2)}</div>
                            <div><span class="order-status status-${order.status}">${order.status || 'pending'}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            modal.style.display = 'flex';
        }
        
        function closeCustomerModal() {
            document.getElementById('customerModal').style.display = 'none';
            selectedCustomer = null;
        }
        
        function createNewOrder() {
            if (selectedCustomer) {
                // Store customer info in sessionStorage for checkout
                sessionStorage.setItem('checkout_customer', JSON.stringify({
                    name: selectedCustomer.name,
                    email: selectedCustomer.email,
                    phone: selectedCustomer.phone
                }));
                window.location.href = 'dashboard.html';
            }
        }
        
        function applyFilter() {
            loadCustomers();
        }
        
        function resetFilter() {
            document.getElementById('searchInput').value = '';
            loadCustomers();
        }
        
        // Setup event listeners
        document.getElementById('applyFilter')?.addEventListener('click', applyFilter);
        document.getElementById('resetFilter')?.addEventListener('click', resetFilter);
        document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') applyFilter();
        });
        
        // Load customers on page load
        loadCustomers();
        
        // Export functions
        window.viewCustomerDetails = viewCustomerDetails;
        window.closeCustomerModal = closeCustomerModal;
        window.createNewOrder = createNewOrder;
    </script>
</body>
</html>
