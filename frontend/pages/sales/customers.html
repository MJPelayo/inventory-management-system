<!-- frontend/pages/sales/customers.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management - Sales | Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Base CSS (required for theme system) -->
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/theme-switcher.css">
    <link rel="stylesheet" href="../../css/theme-layouts.css">
    <link rel="stylesheet" href="../../css/main.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="../../css/sales.css">
    <link rel="stylesheet" href="../../css/sales-customers.css">
    <!-- Chat CSS -->
    <link rel="stylesheet" href="../../css/chat.css">
</head>
<body>
    <div class="app">
        <!-- Header will be injected here -->
        <header id="appHeader"></header>
        
        <div class="app-body">
            <!-- Sidebar will be injected here -->
            <aside id="sidebar"></aside>
            
            <!-- Main Content with Unified Panel Container -->
            <main class="main-content">
                <div class="global-container">
                    <div class="panel-container">
                        <!-- Theme Header Widget -->
                        <div class="theme-header-widget" id="themeHeaderWidget"></div>
                    
                        <!-- Page Header -->
                        <div class="page-header">
                            <div>
                                <h1 class="page-title">Customer Management</h1>
                                <p class="page-subtitle">View customer history and purchase patterns</p>
                            </div>
                        </div>
                        
                        <!-- Filter Bar -->
                        <div class="filter-bar">
                            <div class="filter-row">
                                <div class="filter-group">
                                    <label>🔍 Search Customer</label>
                                    <input type="text" id="searchInput" placeholder="Name, email, or phone...">
                                </div>
                                <div class="filter-actions">
                                    <button class="btn btn-primary btn-sm" id="applyFilter">Search</button>
                                    <button class="btn btn-secondary btn-sm" id="resetFilter">Reset</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="customers-table-container">
                            <div id="customersTableContainer">
                                <div class="loading-state">Loading customers...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Customer Detail Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalCustomerName">Customer Details</h2>
                <button class="close-btn" onclick="closeCustomerModal()">&times;</button>
            </div>
            <div class="modal-body" id="customerDetailContent">
                <div class="loading-state">Loading...</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCustomerModal()">Close</button>
                <button class="btn btn-primary" id="newOrderBtn" onclick="createNewOrder()">+ New Order</button>
            </div>
        </div>
    </div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/chat.js"></script>
    <script src="../../js/sales-customers.js"></script>
</body>
</html>
