<!-- frontend/pages/supply/purchase-orders.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Orders - Supply</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/supply.css">
</head>
<body>
    <div class="app">
        <header id="appHeader"></header>
        
        <div class="app-body">
            <aside id="sidebar"></aside>
            
            <main class="main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Purchase Orders</h1>
                        <p class="page-subtitle">Create, track, and manage supplier purchase orders</p>
                    </div>
                    <button class="btn btn-primary" onclick="openCreatePOModal()">
                        <span>+</span> Create PO
                    </button>
                </div>
                
                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>Status</label>
                            <select id="statusFilter">
                                <option value="">All</option>
                                <option value="pending">Pending</option>
                                <option value="processing">Processing</option>
                                <option value="shipped">Shipped</option>
                                <option value="delivered">Delivered</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Supplier</label>
                            <select id="supplierFilter">
                                <option value="">All Suppliers</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Search</label>
                            <input type="text" id="searchInput" placeholder="PO Number...">
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-primary btn-sm" id="applyFilter">Apply</button>
                            <button class="btn btn-secondary btn-sm" id="resetFilter">Reset</button>
                        </div>
                    </div>
                </div>
                
                <!-- Purchase Orders Table -->
                <div class="card">
                    <div class="card-header">
                        <h3>All Purchase Orders</h3>
                        <span class="badge" id="poCount">0 orders</span>
                    </div>
                    <div class="card-body">
                        <div id="poTable" class="table-container">
                            <div class="loading">Loading purchase orders...</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Create/Edit PO Modal -->
    <div id="poModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2 id="poModalTitle">Create Purchase Order</h2>
                <button class="close-btn" onclick="closePOModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="poForm">
                    <input type="hidden" id="poId">
                    
                    <div class="form-group">
                        <label>Supplier *</label>
                        <select id="poSupplier" required>
                            <option value="">Select Supplier</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Expected Delivery Date</label>
                        <input type="date" id="poExpectedDate">
                    </div>
                    
                    <h4>Order Items</h4>
                    <div id="poItemsContainer" class="po-items-container">
                        <div class="po-item-row">
                            <select class="po-product-select" style="width: 40%;">
                                <option value="">Select Product</option>
                            </select>
                            <input type="number" class="po-quantity" placeholder="Qty" style="width: 15%;" min="1">
                            <input type="number" class="po-unit-price" placeholder="Unit Price" style="width: 20%;" step="0.01">
                            <button type="button" class="btn-icon add-item-btn" onclick="addPOItemRow()">+</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Shipping Cost</label>
                        <input type="number" id="poShippingCost" step="0.01" value="0">
                    </div>
                    
                    <div class="po-summary">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="poSubtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping:</span>
                            <span id="poShipping">$0.00</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="poTotal">$0.00</span>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closePOModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePurchaseOrder()">Create PO</button>
            </div>
        </div>
    </div>
    
    <!-- PO Details Modal -->
    <div id="poDetailsModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2>PO Details</h2>
                <button class="close-btn" onclick="closePODetailsModal()">&times;</button>
            </div>
            <div class="modal-body" id="poDetailsContent">
                <div class="loading">Loading...</div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closePODetailsModal()">Close</button>
                <button class="btn btn-secondary" onclick="printPO()">🖨️ Print</button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/supply-pos.js"></script>
</body>
</html>
