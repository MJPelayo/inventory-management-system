<!-- frontend/pages/admin/products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Admin | Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/admin.css">
    <style>
        /* Additional page-specific styles */
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-bottom: 20px;
        }
        
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        
        .filter-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            color: var(--text-muted);
        }
        
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
        }
        
        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .card-header-actions {
            display: flex;
            gap: 8px;
        }
        
        .bulk-product-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .bulk-product-item .product-name {
            flex: 2;
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .bulk-product-item .current-price {
            flex: 1;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .bulk-product-item .new-price-input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            width: 120px;
        }
        
        .bulk-products-container {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .details-grid div {
            padding: 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
        }
        
        .inventory-list {
            margin-top: 12px;
        }
        
        .inventory-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
        }
        
        .badge-success {
            background: var(--success-bg);
            color: var(--success);
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger);
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text-primary);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast-success {
            background: var(--success);
        }
        
        .toast-error {
            background: var(--danger);
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.125rem;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        
        .btn-icon:hover {
            background: var(--bg-tertiary);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header will be injected here -->
        <header id="appHeader"></header>
        
        <div class="app-body">
            <!-- Sidebar will be injected here -->
            <aside id="sidebar"></aside>
            
            <!-- Main Content -->
            <main class="main-content">
                <!-- Page Header -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Product Management</h1>
                        <p class="page-subtitle">Manage your product catalog, prices, and inventory</p>
                    </div>
                    <div class="card-header-actions">
                        <button class="btn btn-secondary" onclick="openBulkPriceModal()">
                            <span>💰</span> Bulk Price Update
                        </button>
                        <button class="btn btn-primary" onclick="openProductModal()">
                            <span>+</span> Add Product
                        </button>
                    </div>
                </div>
                
                <!-- Product List Card -->
                <div class="card">
                    <div class="card-header">
                        <h3>All Products</h3>
                        <span class="badge" id="productCount">0 products</span>
                    </div>
                    
                    <!-- Filter Bar -->
                    <div class="card-body">
                        <div class="filter-bar">
                            <div class="filter-group">
                                <label>Category</label>
                                <select id="filterCategory">
                                    <option value="">All Categories</option>
                                </select>
                            </div>
                            
                            <div class="filter-group">
                                <label>Supplier</label>
                                <select id="filterSupplier">
                                    <option value="">All Suppliers</option>
                                </select>
                            </div>
                            
                            <div class="filter-group">
                                <label>Search</label>
                                <input type="text" id="filterSearch" placeholder="Product name or SKU...">
                            </div>
                            
                            <div class="filter-actions">
                                <button class="btn btn-primary btn-sm" id="applyFilter">Apply</button>
                                <button class="btn btn-secondary btn-sm" id="resetFilter">Reset</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Products Table Container -->
                    <div id="productsTable" class="table-container"></div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- ADD/EDIT PRODUCT MODAL -->
    <!-- ============================================ -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Product</h2>
                <button class="close-btn" onclick="closeProductModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product Name *</label>
                            <input type="text" id="productName" required placeholder="e.g., iPhone 15 Pro">
                        </div>
                        
                        <div class="form-group">
                            <label>SKU *</label>
                            <input type="text" id="productSku" required placeholder="e.g., APP-IP15P">
                            <small class="help-text">Unique identifier for this product</small>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Price ($) *</label>
                            <input type="number" id="productPrice" step="0.01" required placeholder="0.00">
                        </div>
                        
                        <div class="form-group">
                            <label>Cost ($) *</label>
                            <input type="number" id="productCost" step="0.01" required placeholder="0.00">
                        </div>
                        
                        <div class="form-group">
                            <label>Brand</label>
                            <input type="text" id="productBrand" placeholder="e.g., Apple, Samsung">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category</label>
                            <select id="productCategory">
                                <option value="">Select Category</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Supplier</label>
                            <select id="productSupplier">
                                <option value="">Select Supplier</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDescription" rows="3" placeholder="Product description..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="productActive" checked>
                            <span>Active (visible in sales catalog)</span>
                        </label>
                    </div>
                    
                    <!-- Inventory Section (only for existing products) -->
                    <div id="inventorySection" style="display:none;">
                        <hr>
                        <h4>Add Inventory</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Warehouse</label>
                                <select id="inventoryWarehouse">
                                    <option value="">Select Warehouse</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Quantity</label>
                                <input type="number" id="inventoryQuantity" placeholder="0">
                            </div>
                            <div class="form-group" style="display: flex; align-items: flex-end;">
                                <button type="button" class="btn btn-secondary" onclick="addInventoryToProduct()">Add Stock</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeProductModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- BULK PRICE UPDATE MODAL -->
    <!-- ============================================ -->
    <div id="bulkPriceModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2>Bulk Price Update</h2>
                <button class="close-btn" onclick="closeBulkPriceModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p class="help-text" style="margin-bottom: 16px;">
                    Update prices for multiple products at once. Enter new prices below and click Apply.
                </p>
                <div id="bulkProductsList" class="bulk-products-container">
                    <div class="loading">Loading products...</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeBulkPriceModal()">Cancel</button>
                <button class="btn btn-primary" onclick="applyBulkPriceUpdate()">Apply Updates</button>
            </div>
        </div>
    </div>
    
    <!-- JavaScript Dependencies -->
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/admin-products.js"></script>
</body>
</html>
