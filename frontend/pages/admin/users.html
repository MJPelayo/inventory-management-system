<!-- frontend/pages/admin/users.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
    <div class="app">
        <header id="appHeader"></header>
        
        <div class="app-body">
            <aside id="sidebar"></aside>
            
            <main class="main-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">User Management</h1>
                        <p class="page-subtitle">Create, edit, and manage system users</p>
                    </div>
                    <button class="btn btn-primary" onclick="openUserModal()">
                        <span>+</span> Add User
                    </button>
                </div>
                
                <!-- Add after the page-header div -->
                <div class="user-stats" id="userStats">
                    <div class="stat-chip">Loading...</div>
                </div>

                <!-- Add filter bar (if not already there) -->
                <div class="filter-bar">
                    <div class="filter-group">
                        <label>Search</label>
                        <input type="text" id="userSearch" placeholder="Name, email, or role...">
                    </div>
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="userStatusFilter">
                            <option value="all">All</option>
                            <option value="active">Active Only</option>
                            <option value="inactive">Inactive Only</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Sort By</label>
                        <select id="userSort">
                            <option value="name">Name</option>
                            <option value="email">Email</option>
                            <option value="role">Role</option>
                        </select>
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-primary btn-sm" id="applyFilter">Apply</button>
                        <button class="btn btn-secondary btn-sm" id="resetFilter">Reset</button>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-body">
                        <div id="usersTable"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Add/Edit User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add User</h2>
                <button class="close-btn" onclick="closeUserModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="userName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="userEmail" required>
                    </div>
                    
                    <div class="form-group" id="passwordGroup">
                        <label>Password *</label>
                        <input type="password" id="userPassword">
                        <small class="help-text">Leave blank to keep current password when editing</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Role *</label>
                        <select id="userRole" required>
                            <option value="">Select Role</option>
                            <option value="admin">Admin</option>
                            <option value="sales">Sales Manager</option>
                            <option value="warehouse">Warehouse Manager</option>
                            <option value="supply">Supply Manager</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="departmentGroup" style="display:none;">
                        <label>Department</label>
                        <input type="text" id="userDepartment" placeholder="e.g., Sales, Operations">
                    </div>
                    
                    <div id="salesTargetGroup" style="display:none;">
                        <label>Sales Target ($)</label>
                        <input type="number" id="userSalesTarget" step="1000">
                    </div>

                    <div id="userCommissionRateGroup" style="display:none;">
                        <label>Commission Rate (%)</label>
                        <input type="number" id="userCommissionRate" step="0.5" value="5">
                    </div>

                    <div id="warehouseGroup" style="display:none;">
                        <label>Assigned Warehouse ID</label>
                        <input type="number" id="userWarehouseId">
                    </div>

                    <div id="userShiftGroup" style="display:none;">
                        <label>Shift</label>
                        <input type="text" id="userShift" placeholder="e.g., Day, Night">
                    </div>

                    <div id="budgetGroup" style="display:none;">
                        <label>Purchase Budget ($)</label>
                        <input type="number" id="userPurchaseBudget" step="1000">
                    </div>

                    <div id="userActiveGroup">
                        <label class="checkbox-label">
                            <input type="checkbox" id="userActive" checked>
                            <span>Active Account</span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeUserModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveUser()">Save User</button>
            </div>
        </div>
    </div>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/components.js"></script>
    <script src="../../js/admin-users.js"></script>
</body>
</html>
