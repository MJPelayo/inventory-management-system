<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN VIEW</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Inventory Management System</h1>
    </header>

    <main>
        <!-- Side Navigation -->
        <nav id="sideNav" class="side-nav">
            <ul class="nav-menu">
                <li>
                    <a class="nav-link active" href="admin.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span class="nav-text">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="products.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        <span class="nav-text">Products</span>
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="#">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span class="nav-text">Warehouses</span>
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="#">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span class="nav-text">Suppliers</span>
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="#">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                        <span class="nav-text">Reports</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="content-area">
            <!-- Main Content -->
            <section class="main-content">
                <h2>Admin Dashboard</h2>
                <p>Manage users and their permissions.</p>
                <div class="AddButtonContainer">
                    <button id="addUserBtn" class="AddBtn">Add New User</button>
                </div>
            </section>

            <!-- Search bar (Products-style toolbar) -->
            <div class="toolbar">
                <div class="search-wrap">
                    <input type="text" id="userSearch" placeholder="Search name or email..." />
                </div>
            </div>

            <!-- User Table -->
            <section class="user-table">
                <h3>User Management</h3>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </section>

            <!-- Add User Modal -->
            <div  id="addUserModal" class="modal">
                <div class="modal-content">
                    <span id="closeModal" class="close">&times;</span>
                    <h2>Add New User</h2>
                    <div id="formErrorMsg" class="error-message"></div>
                    <form id="addUserForm">
                        <label for="name">Name</label>
                        <input id="name" type="text" required />

                        <label for="email">Email</label>
                        <input id="email" type="email" required />

                        <label for="password">Password</label>
                        <input id="password" type="password" required />

                        <label for="role">Role</label>
                        <select id="role" required>
                            <option value="">Select Role</option>
                            <option value="admin">Admin</option>
                            <option value="sales">Sales</option>
                            <option value="warehouse">Warehouse</option>
                            <option value="supply">Supply</option>
                        </select>

                        <button type="submit" class="AddBtn">Save User</button>
                    </form>
                </div>
            </div>

            <!-- Edit User Modal -->
            <div  id="editUserModal" class="modal">
                <div class="modal-content">
                    <span id="closeEditModal" class="close">&times;</span>
                    <h2>Edit User</h2>
                    <div id="editFormErrorMsg" class="error-message"></div>
                    <form id="editUserForm">
                        <input type="hidden" id="editUserId" />
                        <label for="editName">Name</label>
                        <input id="editName" type="text" required />

                        <label for="editEmail">Email</label>
                        <input id="editEmail" type="email" required />

                        <label for="editRole">Role</label>
                        <select id="editRole" required>
                            <option value="">Select Role</option>
                            <option value="admin">Admin</option>
                            <option value="sales">Sales</option>
                            <option value="warehouse">Warehouse</option>
                            <option value="supply">Supply</option>
                        </select>
                        <button type="submit" class="AddBtn">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
        <script src="admin.js"></script>
    </main>
</body>
</html>
