<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN VIEW</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Inventory Management System</h1>
    </header>

    <main>
        <!-- Side Navigation -->
        <nav id="sideNav" class="side-nav">
            <ul class="nav-menu">
                <li>
                    <a href="admin.html" class="nav-link active">
                         <span class="nav-icon">👥</span>
                        <span class="nav-text">Users</span>
                    </a>
                </li>
                <li>
                    <a href="products.html" class="nav-link">
                        <span class="nav-icon">📦</span>
                        <span class="nav-text">Products</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="content-area">
            <!-- Main Content -->
            <section class="main-content">
                <h2>Admin Dashboard</h2>
                <p>Welcome to the Admin Dashboard!</p>
                <div class="action-buttons">
                    <button id="addUserBtn" class="btn">
                        <span class="btn-icon">+</span> Add New User
                    </button>
                </div>
            </section>

            <!-- User Table -->
            <section class="user-table">
                <h3>User Management</h3>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- User data will be populated here -->
                    </tbody>
                </table>
            </section>

            <!-- Add User Modal -->
            <section id="addUserModal" class="modal">
                <div class="modal-content">
                    <span id="closeModal" class="close">&times;</span>
                    <h2>Add New User</h2>
                    <form id="addUserForm">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>

                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>

                        <label for="role">Role:</label>
                        <select id="role" name="role" required>
                            <option value="">Select Role</option>
                            <option value="admin">Admin</option>
                            <option value="user">Sales</option>
                            <option value="user">Supply</option>
                            <option value="user">Warehouse</option>
                        </select>

                        <button type="submit" class="btn">Add User</button>
                    </form>
                </div>
            </section>

        </div>
        <script src="admin.js"></script>
    </main>
</body>
</html>
