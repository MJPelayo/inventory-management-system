<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers</title>
    <link rel="stylesheet" href="../css/navbarStyle.css">
    <link rel="stylesheet" href="../css/suppliers.css">

</head>
<body>
    <header>
        <h1>Inventory Management System</h1>
    </header>
    <main>
        <!-- Side Navigation -->
        <nav id="sideNav" class="side-nav">
            <ul class="nav-menu">
                <li>
                    <a class="nav-link" href="Reports.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                        <span class="nav-text">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="Users.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span class="nav-text">Users</span>
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="Products.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        <span class="nav-text">Products</span>
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="Warehouses.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span class="nav-text">Warehouses</span>
                    </a>
                </li>
                <li>
                    <a class="nav-link active" href="Suppliers.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span class="nav-text">Suppliers</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="content-area">
            <!-- Main Content -->
            <section class="main-content">
                <h2>Suppliers</h2>
                <p>Manage and view supplier information.</p>
                <div class="AddButtonContainer">
                    <button id="addSupplierBtn" class="AddBtn">Add New Supplier</button>
                </div>
            </section>

            <!-- Search bar (Products-style toolbar) -->
            <div class="toolbar">
                <div class="search-wrap">
                    <input type="text" id="supplierSearch" placeholder="Search supplier..." />
                </div>
            </div>

            <!-- Supplier Table -->
            <section class="supplier-table">
                <h3>Supplier Management</h3>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Contact</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Payment Terms</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="supplierTableBody"></tbody>
                </table>
            </section>
        </div>

        <!-- Add New Supplier Modal-->
        <div  id="addSupplierModal" class="modal">
            <div class="modal-content">
                <span id="closeModal" class="close">&times;</span>
                <h2>Add New Supplier</h2>

                <form id="addSupplierForm">
                    <div class="supplier-form-grid">
                        <div class="form-field">
                            <label for="name">Name</label>
                            <input id="name" type="text" />
                        </div>

                        <div class="form-field">
                            <label for="contact">Contact Person</label>
                            <input id="contact" type="text" />
                        </div>

                        <div class="form-field">
                            <label for="phone">Phone</label>
                            <input id="phone" type="text"/>
                        </div>

                        <div class="form-field">
                            <label for="email">Email</label>
                            <input id="email" type="email" />
                        </div>

                        <div class="form-field field-full">
                            <label for="address">Address</label>
                            <input id="address" type="text" />
                        </div>

                        <div class="form-field">
                            <label for="taxId">Tax ID</label>
                            <input id="taxId" type="text" />
                        </div>

                        <div class="form-field">
                            <label for="paymentTerms">Payment Terms</label>
                            <select id="paymentTerms">
                                <option value="">Select Payment Terms</option>
                                <option value="DOR">Due on Receipt</option>
                                <option value="advance">50% Advance</option>
                                <option value="COD">Cash on Delivery</option>
                                <option value="EOM">End of Month</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label for="minOrder">Minimum Order Quantity</label>
                            <input id="minOrder" type="number" />
                        </div>

                        <div class="form-field">
                            <label for="totalOrder">Total Order Quantity</label>
                            <input id="totalOrder" type="number" />
                        </div>                        

                        <div class="form-field field-full metrics-row">
                            <div class="form-field">
                                <label for="status">Status</label>
                                <select id="status">
                                    <option value="true">Active</option>
                                    <option value="false">Inactive</option>
                                </select>
                            </div>

                            <div class="form-field">
                                <label for="leadTime">Lead Time Days</label>
                                <input id="leadTime" type="number" />
                            </div>

                            <div class="form-field">
                                <label for="onTimeDelivery">On-Time Deliveries</label>
                                <input id="onTimeDelivery" type="number" />
                            </div>

                            <div class="form-field">
                                <label for="qualityRating">Quality Rating (0-5)</label>
                                <input id="qualityRating" type="number" step="0.1" min="0" max="5" />
                            </div>
                        </div>
                    </div>

                    <div id="formErrorMsg" class="error-message"></div>

                    <button type="submit" class="AddBtn">Save Supplier</button>
                </form>
            </div>
        </div>

        <!-- Edit Supplier -->
         <div  id="editSupplierModal" class="modal">
            <div class="modal-content">
                <span id="closeEditModal" class="close">&times;</span>
                <h2>Edit Supplier</h2>

                <form id="editSupplierForm">
                    <input id="editSupplierId" type="hidden" />
                    <div class="supplier-form-grid">
                        <div class="form-field">
                            <label for="editName">Name</label>
                            <input id="editName" type="text" />
                        </div>

                        <div class="form-field">
                            <label for="editContact">Contact Person</label>
                            <input id="editContact" type="text" />
                        </div>

                        <div class="form-field">
                            <label for="editPhone">Phone</label>
                            <input id="editPhone" type="text"/>
                        </div>

                        <div class="form-field">
                            <label for="editEmail">Email</label>
                            <input id="editEmail" type="email" />
                        </div>

                        <div class="form-field field-full">
                            <label for="editAddress">Address</label>
                            <input id="editAddress" type="text" />
                        </div>

                        <div class="form-field">
                            <label for="editTaxId">Tax ID</label>
                            <input id="editTaxId" type="text" />
                        </div>

                        <div class="form-field">
                            <label for="editPaymentTerms">Payment Terms</label>
                            <select id="editPaymentTerms">
                                <option value="">Select Payment Terms</option>
                                <option value="DOR">Due on Receipt</option>
                                <option value="50% Advance">50% Advance</option>
                                <option value="COD">Cash on Delivery</option>
                                <option value="EOM">End of Month</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label for="editMinOrder">Minimum Order Quantity</label>
                            <input id="editMinOrder" type="number" />
                        </div>

                        <div class="form-field">
                            <label for="editTotalOrder">Total Order Quantity</label>
                            <input id="editTotalOrder" type="number" />
                        </div>                        

                        <div class="form-field field-full metrics-row">
                            <div class="form-field">
                                <label for="editStatus">Status</label>
                                <select id="editStatus">
                                    <option value="true">Active</option>
                                    <option value="false">Inactive</option>
                                </select>
                            </div>

                            <div class="form-field">
                                <label for="editLeadTime">Lead Time Days</label>
                                <input id="editLeadTime" type="number" />
                            </div>

                            <div class="form-field">
                                <label for="editOnTimeDelivery">On-Time Deliveries</label>
                                <input id="editOnTimeDelivery" type="number" />
                            </div>

                            <div class="form-field">
                                <label for="editQualityRating">Quality Rating (0-5)</label>
                                <input id="editQualityRating" type="number" step="0.1" min="0" max="5" />
                            </div>
                        </div>
                    </div>

                    <div id="editFormErrorMsg" class="error-message"></div>

                    <button type="submit" class="AddBtn">Save Supplier</button>
                </form>
            </div>
        </div>
         

    </main>
    <script src="../js/suppliers.js"></script>

</body>
</html>
